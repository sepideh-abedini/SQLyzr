version: '3.8'

services:
  app:
    image: "ghcr.io/parser:app"
    build:
      context: .
      tags:
        - "ghcr.io/parser"
      cache_from:
        - type=local,src=./.build-cache
      cache_to:
        - type=local,dest=./.build-cache
    env_file: .env
    entrypoint: tail -f /dev/null
    volumes:
      - "./out:/app/out"
      - "./data:/app/data"
      - "./gui.json:/app/gui.json"
      - "./.env:/app/.env"
    network_mode: host
