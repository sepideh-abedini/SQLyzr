services:
  mysql:
    image: mysql:8.0
    restart: on-failure
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_HOSTS=%
      - MYSQL_ROOT_PASSWORD=sheep
    volumes:
      - "./confs/mysql.cnf:/etc/mysql/conf.d/mysql.cnf"
      - "./${SQLYZR_DATA_DIR:?SQLYZR_DATA_DIR}/beaver/dumps:/docker-entrypoint-initdb.d"
      - "./${SQLYZR_DATA_DIR:?SQLYZR_DATA_DIR}/beaver:/beaver"
      - "./${SQLYZR_DATA_DIR:?SQLYZR_DATA_DIR}/beaver_data:/var/lib/mysql"
    networks:
      - sqlyzr

networks:
  sqlyzr:
