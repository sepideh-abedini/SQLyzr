name: Run E2E Tests
on:
  push:
    branches: [ synth ]
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      #
      - name: Deploy Web GUI
        run: |
          docker compose -f docker-compose.web.yml up --build -d
