services:
  web:
    build:
      tags:
        - "${IMAGE_TAG}"
      args:
        WEB_PORT: "${WEB_PORT}"
        WEB_DOMAIN: "${WEB_DOMAIN}"
    volumes:
      - "web_out:/app/out"
      - "/data:/app/data"
      - "./gui.json:/app/gui.json"
    env_file: ".env"
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    networks:
      - sqlyzr
    shm_size: '8gb'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.tls=true"
      - "traefik.http.routers.whoami.rule=Host(`ui.sqlyzr.xyz`)"

  mysql:
    image: mysql:8.0
    restart: on-failure
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_HOSTS=%
      - MYSQL_ROOT_PASSWORD=sheep
    volumes:
      - "./confs/mysql.cnf:/etc/mysql/conf.d/mysql.cnf"
      - "/data/beaver/dumps:/docker-entrypoint-initdb.d"
      - "/data/beaver:/beaver"
      - "/data/beaver_data:/var/lib/mysql"
    networks:
      - sqlyzr
  traefik:
    image: traefik:v2.11
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik.tls.yml:/etc/traefik/dynamic/tls.yml
      - /certs:/certs
    networks:
      - sqlyzr
  whoami:
    image: traefik/whoami
    networks:
      - sqlyzr
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.tls=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.sqlyzr.xyz`)"

volumes:
  web_out:
  beaver_data:

networks:
  sqlyzr:
