services:
  web:
    image: "${IMAGE_TAG}"
    volumes:
      - "web_out:/app/out"
      - "/data:/app/data"
      - "./gui.json:/app/gui.json"
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    networks:
      - sqlyzr
    shm_size: '8gb'

  mysql:
    image: mysql:8.0
    restart: on-failure
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_HOSTS=%
      - MYSQL_ROOT_PASSWORD=sheep
    volumes:
      - "./confs/mysql.cnf:/etc/mysql/conf.d/mysql.cnf"
      - "/data/beaver/dumps:/docker-entrypoint-initdb.d"
      - "/data/beaver:/beaver"
      - "/data/beaver_data:/var/lib/mysql"
    networks:
      - sqlyzr

volumes:
  web_out:
  beaver_data:

networks:
  sqlyzr:
