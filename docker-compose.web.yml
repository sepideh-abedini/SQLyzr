version: '3.8'

services:
  web:
    image: "${IMAGE_TAG}"
    volumes:
      - "web_out:/app/out"
      - "/data:/app/data"
      - "./gui.json:/app/gui.json"
    environment:
      - "MYSQL_HOST=mysql"
    ports:
      - "${SQLYZR_WEB_PORT}:${SQLYZR_WEB_PORT}"
    networks:
      - sqlyzr

volumes:
  web_out:

networks:
  sqlyzr:
    external: true
